<!doctype html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Addict ML</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            background: #06080f; color: #f1f5f9;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .bg-mesh {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(34, 211, 238, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(139, 92, 246, 0.08), transparent);
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.1; animation: orb-float 20s ease-in-out infinite; }
        .orb-1 { width: 500px; height: 500px; top: -10%; left: 30%; background: #22d3ee; }
        .orb-2 { width: 400px; height: 400px; bottom: 10%; right: -5%; background: #a78bfa; animation-delay: -7s; }
        @keyframes orb-float { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20px,20px) scale(0.95); } }

        .auth-container {
            position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px;
            animation: fadeInUp 0.6s ease forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .auth-card {
            padding: 40px 36px; border-radius: 28px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(99, 179, 237, 0.08);
            backdrop-filter: blur(20px);
        }
        .auth-logo {
            font-family: 'Outfit', sans-serif; font-size: 1.6rem; font-weight: 800;
            text-align: center; margin-bottom: 8px;
            background: linear-gradient(135deg, #22d3ee, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-subtitle { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.82rem; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 13px 16px; border-radius: 14px; font-size: 0.92rem;
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(99, 179, 237, 0.12);
            color: #f1f5f9; font-family: inherit; outline: none;
            transition: all 0.25s ease;
        }
        .form-input:focus { border-color: #22d3ee; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1); }
        .form-input::placeholder { color: #64748b; }

        .btn-login {
            width: 100%; padding: 14px; border: none; border-radius: 14px; cursor: pointer;
            font-size: 0.95rem; font-weight: 700; font-family: inherit;
            background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #020617;
            transition: all 0.3s ease; margin-top: 8px;
            box-shadow: 0 4px 24px rgba(34, 211, 238, 0.25);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(34, 211, 238, 0.35); }

        .auth-footer {
            text-align: center; margin-top: 24px; font-size: 0.85rem; color: #64748b;
        }
        .auth-footer a { color: #22d3ee; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        .flash-msg {
            padding: 12px 16px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 20px;
            background: rgba(251, 113, 133, 0.1); border: 1px solid rgba(251, 113, 133, 0.2); color: #fb7185;
        }
        .flash-msg.success {
            background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.2); color: #34d399;
        }
        .flash-msg.warning {
            background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.2); color: #fbbf24;
        }

        @media (max-width: 480px) {
            .auth-container { padding: 16px; }
            .auth-card { padding: 32px 24px; border-radius: 22px; }
            .auth-logo { font-size: 1.4rem; }
            .form-input { padding: 12px 14px; font-size: 0.88rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">SmartAddict ML</div>
            <p class="auth-subtitle">Masuk ke akun Anda</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="flash-msg {{ cat }}">{{ msg }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Masukkan username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn-login">🔐 Login</button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a>
            </div>
        </div>
    </div>
</body>
</html>
