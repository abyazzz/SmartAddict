<!doctype html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Addict ML</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        // Init theme immediately to prevent flashing
        (function() {
            const saved = localStorage.getItem('sa-theme');
            const theme = saved ? saved : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        :root, [data-theme="dark"] {
            --m-blue-light: #00bcd4;
            --m-blue-dark: #1c69d4;
            --m-red: #e22718;
            --bg-body: #030303;
            --bg-card: rgba(13, 13, 13, 0.65);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #666666;
            --grid-color: rgba(255, 255, 255, 0.012);
            --input-bg: rgba(18, 18, 18, 0.7);
            --input-border: rgba(255, 255, 255, 0.07);
        }

        [data-theme="light"] {
            --m-blue-light: #00acc1;
            --m-blue-dark: #1565c0;
            --m-red: #d32f2f;
            --bg-body: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.75);
            --border-card: rgba(15, 23, 42, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --grid-color: rgba(15, 23, 42, 0.015);
            --input-bg: rgba(241, 245, 249, 0.85);
            --input-border: rgba(15, 23, 42, 0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            background: var(--bg-body); 
            color: var(--text-primary);
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden; 
            position: relative;
            transition: background 0.3s ease;
        }

        /* Ambient Glowing Background Blobs */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            z-index: 0;
            pointer-events: none;
        }
        .sphere-1 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, var(--m-blue-light) 0%, var(--m-blue-dark) 100%);
            top: -10%;
            left: -10%;
            animation: float1 18s ease-in-out infinite alternate;
        }
        .sphere-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--m-blue-dark) 0%, var(--m-red) 100%);
            bottom: -15%;
            right: -10%;
            animation: float2 22s ease-in-out infinite alternate;
        }
        @keyframes float1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(120px, 80px) scale(1.15); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0) scale(1.1); }
            100% { transform: translate(-100px, -70px) scale(0.9); }
        }

        /* Tech Grid Overlay */
        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            position: relative; 
            z-index: 1; 
            width: 100%; 
            max-width: 440px; 
            padding: 20px;
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Glassmorphism Card Design */
        .auth-card {
            padding: 50px 40px; 
            border-radius: 16px;
            background: var(--bg-card); 
            border: 1px solid var(--border-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .auth-card::before {
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 3px;
            background: linear-gradient(90deg, var(--m-blue-light) 0%, var(--m-blue-dark) 50%, var(--m-red) 100%);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            font-size: 1.7rem; 
            font-weight: 900;
            letter-spacing: 0.08em; 
            text-transform: uppercase;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-bottom: 8px;
            transition: color 0.3s;
        }
        .auth-logo-ml {
            background: linear-gradient(90deg, var(--m-blue-light), var(--m-blue-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 950;
        }
        .auth-subtitle { 
            color: var(--text-secondary); 
            font-size: 0.78rem; 
            text-transform: uppercase; 
            letter-spacing: 1.8px; 
            font-weight: 500;
            transition: color 0.3s;
        }

        .form-group { 
            margin-bottom: 24px; 
            position: relative;
        }
        .form-label { 
            display: block; 
            font-size: 0.72rem; 
            font-weight: 800; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        .form-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%; 
            padding: 14px 16px 14px 44px; 
            border-radius: 8px; 
            font-size: 0.9rem;
            background: var(--input-bg); 
            border: 1px solid var(--input-border);
            color: var(--text-primary); 
            font-family: inherit; 
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .form-input:focus { 
            border-color: var(--m-blue-light); 
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.12);
            background: var(--bg-card);
        }
        .form-input::placeholder { color: var(--text-muted); }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .form-input:focus + .input-icon {
            color: var(--m-blue-light);
        }

        .btn-login {
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 0.82rem; 
            font-weight: 800; 
            font-family: inherit;
            background: linear-gradient(90deg, var(--m-blue-dark) 0%, var(--m-blue-light) 100%); 
            color: #ffffff;
            transition: all 0.3s ease; 
            margin-top: 12px;
            text-transform: uppercase; 
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(28, 105, 212, 0.25);
        }
        .btn-login:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 188, 212, 0.35);
            filter: brightness(1.1);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center; 
            margin-top: 32px; 
            font-size: 0.78rem; 
            color: var(--text-secondary);
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .auth-footer a { 
            color: var(--m-blue-light); 
            text-decoration: none; 
            font-weight: 800; 
            transition: color 0.2s;
        }
        .auth-footer a:hover { 
            color: var(--text-primary);
            text-decoration: underline; 
        }

        .flash-msg {
            padding: 14px 16px; 
            border-radius: 8px; 
            font-size: 0.78rem; 
            margin-bottom: 24px;
            background: rgba(226, 39, 24, 0.08); 
            border: 1px solid rgba(226, 39, 24, 0.2); 
            color: #ff4a3d;
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .flash-msg.success {
            background: rgba(52, 211, 153, 0.08); 
            border-color: rgba(52, 211, 153, 0.2); 
            color: #34d399;
        }

        /* Floating Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            font-size: 1.1rem;
        }
        .theme-toggle:hover {
            border-color: var(--m-blue-light);
            transform: rotate(15deg) scale(1.05);
            box-shadow: 0 0 12px rgba(0, 188, 212, 0.2);
        }

        @media (max-width: 480px) {
            .auth-container { padding: 16px; }
            .auth-card { padding: 40px 24px; }
            .auth-logo { font-size: 1.5rem; }
            .form-input { padding: 12px 14px 12px 42px; font-size: 0.85rem; }
            .input-icon { left: 14px; }
            .theme-toggle { top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <!-- Floating Theme Switcher -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle tema">
        <span id="themeIcon">🌙</span>
    </button>

    <!-- Background visual decor -->
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">SmartAddict<span class="auth-logo-ml">ML</span></div>
                <p class="auth-subtitle">Masuk ke akun Anda</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="flash-msg {{ cat }}">
                <span>⚠️</span>
                <span>{{ msg }}</span>
            </div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="form-input-wrapper">
                        <input type="text" name="username" class="form-input" placeholder="Masukkan username" required autofocus>
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="form-input-wrapper">
                        <input type="password" name="password" class="form-input" placeholder="Masukkan password" required>
                        <span class="input-icon">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <span>Masuk Dashboard</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="{{ url_for('register') }}">Daftar sekarang</a>
            </div>
        </div>
    </div>

    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('sa-theme', theme);
            const icon = document.getElementById('themeIcon');
            if (icon) {
                icon.textContent = theme === 'light' ? '☀️' : '🌙';
            }
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }
        
        // Load initial theme representation on button
        const initialTheme = document.documentElement.getAttribute('data-theme') || 'dark';
        const icon = document.getElementById('themeIcon');
        if (icon) {
            icon.textContent = initialTheme === 'light' ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
