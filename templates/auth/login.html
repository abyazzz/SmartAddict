<!doctype html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Addict ML</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            background: #000000; color: #ffffff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        .auth-container {
            position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px;
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .auth-card {
            padding: 48px 36px; border-radius: 0px;
            background: #0d0d0d; border: 1px solid #222222;
            position: relative;
        }
        .auth-card::before {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 4px;
            background: #1c69d4;
        }

        .auth-logo {
            font-family: 'Inter', sans-serif; font-size: 1.5rem; font-weight: 900;
            text-align: center; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase;
        }
        .auth-subtitle { 
            text-align: center; color: #aaaaaa; font-size: 0.8rem; margin-bottom: 32px; 
            text-transform: uppercase; letter-spacing: 1.5px; font-weight: 300;
        }

        .form-group { margin-bottom: 24px; }
        .form-label { 
            display: block; font-size: 0.78rem; font-weight: 800; color: #ffffff; 
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1.5px;
        }
        .form-input {
            width: 100%; padding: 14px 16px; border-radius: 0px; font-size: 0.9rem;
            background: #141414; border: 1px solid #2a2a2a;
            color: #ffffff; font-family: inherit; outline: none;
            transition: all 0.25s ease;
        }
        .form-input:focus { border-color: #ffffff; }
        .form-input::placeholder { color: #555555; }

        .btn-login {
            width: 100%; padding: 15px; border: 1px solid #ffffff; border-radius: 0px; cursor: pointer;
            font-size: 0.85rem; font-weight: 800; font-family: inherit;
            background: transparent; color: #ffffff;
            transition: all 0.3s ease; margin-top: 12px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-login:hover { 
            background: #ffffff; color: #000000; 
        }

        .auth-footer {
            text-align: center; margin-top: 28px; font-size: 0.82rem; color: #888888;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .auth-footer a { color: #ffffff; text-decoration: none; font-weight: 800; }
        .auth-footer a:hover { text-decoration: underline; }

        .flash-msg {
            padding: 12px 16px; border-radius: 0px; font-size: 0.8rem; margin-bottom: 20px;
            background: rgba(226, 39, 24, 0.1); border: 1px solid rgba(226, 39, 24, 0.25); color: #e22718;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
        }
        .flash-msg.success {
            background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.25); color: #34d399;
        }
        .flash-msg.warning {
            background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.25); color: #fbbf24;
        }

        @media (max-width: 480px) {
            .auth-container { padding: 16px; }
            .auth-card { padding: 36px 24px; }
            .auth-logo { font-size: 1.3rem; }
            .form-input { padding: 12px 14px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">SmartAddict<span style="color:#1c69d4; font-weight: 900; margin-left: 4px;">ML</span></div>
            <p class="auth-subtitle">Masuk ke akun Anda</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for cat, msg in messages %}
            <div class="flash-msg {{ cat }}">{{ msg }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Masukkan username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="btn-login">🔐 Login</button>
            </form>

            <div class="auth-footer">
                Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a>
            </div>
        </div>
    </div>
</body>
</html>
